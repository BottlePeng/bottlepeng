<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="todo-app">
        <div class="title">Battle Todo App</div>

        <div class="todo-from">
            <input class="todo-input" type="text" placeholder="Add a todo...">
            <div class="todo-button">Add todo</div>
        </div>
 
        <div class="item completed">
            <div>
                <input type="checkbox">
                <span class="name">吃饭</span>
            </div>
            <div class="del">del</div>
        </div>
        <div class="item">
            <div>
                <input type="checkbox">
                <span class="name">吃饭</span>
            </div>
            <div class="del">del</div>
        </div>
        <div class="item">
            <div>
                <input type="checkbox">
                <span class="name">吃饭</span>
            </div>
            <div class="del">del</div>
        </div>
        
    </div>

    <style>
        body {
            background-color: aqua;
        }
        .todo-app {
            width: 98%;
            height: 500px;
            background-color: azure;
            border-radius: 10px;
            margin-top: 40px;
            margin-left: 1%;
            padding-top: 30px;
            box-sizing: border-box;
        }
        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
        }
        .todo-from {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .todo-input {
            border: 1px solid #ccc;
            outline: none;
            width: 60%;
            height: 50px;
            border-radius: 20px 0 0 20px;
            padding-left: 15px;
        }
        .todo-button {
            width: 100px;
            height: 54px;
            border-radius: 0 20px 20px 0;
            
            text-align: center;
            line-height: 54px;
            
            background: linear-gradient(
                to right,
                rgb(0, 60, 255),
                rgb(0, 153, 255)
            );

            cursor: pointer;
            user-select: none;
            color: white;
        }
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            width: 80%;
            height: 50px;
            margin: 8px auto;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #ccc;
            box-shadow: rgba(92, 174, 255, 0.2) 0px 8px 24px;
        }
        .del {
            color: red;
        }
        .completed {
            text-decoration: line-through;
            opacity: 0.4;
        }
    </style>
</body>
</html>
